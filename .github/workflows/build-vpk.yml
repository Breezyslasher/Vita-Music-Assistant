name: Build VPK

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vita:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install build requirements
        run: |
          apk update
          apk add cmake ninja git zstd tar pkgconf

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        env:
          SWITCHFIN_URL: https://github.com/dragonflylee/switchfin/releases/download/vita-packages
        run: |
          for pkg in mbedtls-3.6.7-1 curl-8.16.0-3; do
            wget "$SWITCHFIN_URL/${pkg}-arm.tar.xz"
          done
          vdpm zstd freetype libpng $PWD/*-arm.tar.xz
          git config --system --add safe.directory "$GITHUB_WORKSPACE"

      # aiortc-based gateways (Music Assistant remote access) refuse the DTLS
      # connection unless a DTLS-SRTP profile is negotiated, even for
      # datachannel-only sessions. vitasdk's prebuilt mbedTLS lacks
      # MBEDTLS_SSL_DTLS_SRTP, so rebuild it with the option enabled using the
      # same recipe as vitasdk/packages (source + vita patch + threading).
      - name: Rebuild mbedTLS with DTLS-SRTP support
        run: |
          apk add python3 patch bzip2
          cd /tmp
          wget -q https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-3.6.7/mbedtls-3.6.7.tar.bz2
          tar xf mbedtls-3.6.7.tar.bz2
          cd mbedtls-3.6.7
          patch -p1 < "$GITHUB_WORKSPACE/patches/mbedtls_vitasdk.patch"
          python3 scripts/config.py set MBEDTLS_THREADING_C
          python3 scripts/config.py set MBEDTLS_THREADING_PTHREAD
          python3 scripts/config.py set MBEDTLS_SSL_DTLS_SRTP
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=$VITASDK/arm-vita-eabi -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_PROGRAMS=OFF -DENABLE_TESTING=OFF -DMBEDTLS_FATAL_WARNINGS=OFF
          make -j$(nproc) mbedtls
          make install

      # The prebuilt curl from the switchfin mirror is compiled against that
      # mirror's own mbedTLS/pthread configuration, which has drifted from the
      # toolchain here (on-device crash: data abort in pthread_mutex_unlock via
      # Curl_mbedtlsthreadlock during curl_global_init). Build curl from source
      # against the mbedTLS rebuilt above so the whole TLS stack is
      # ABI-consistent. With MBEDTLS_THREADING_C available, curl uses mbedTLS's
      # own locking and the crashing shim compiles out entirely.
      - name: Build curl against the rebuilt mbedTLS
        run: |
          cd /tmp
          wget -q https://github.com/curl/curl/releases/download/curl-8_16_0/curl-8.16.0.tar.gz
          tar xf curl-8.16.0.tar.gz
          cd curl-8.16.0
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=$VITASDK/arm-vita-eabi -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_CURL_EXE=OFF -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTING=OFF -DENABLE_IPV6=OFF \
            -DCURL_DISABLE_SOCKETPAIR=ON -DHAVE_FCNTL_O_NONBLOCK=OFF -DENABLE_THREADED_RESOLVER=OFF \
            -DBUILD_LIBCURL_DOCS=OFF -DBUILD_MISC_DOCS=OFF -DENABLE_CURL_MANUAL=OFF \
            -DCURL_CA_BUNDLE="vs0:data/external/cert/CA_LIST.cer" -DCURL_USE_LIBPSL=OFF \
            -DCURL_USE_MBEDTLS=ON -DCURL_USE_OPENSSL=OFF -DCURL_ZSTD=ON
          sed -i '/HAVE_PIPE2/d' lib/curl_config.h
          make -j$(nproc)
          make install

      - name: Build
        run: |
          cmake -B build -G Ninja
          cmake --build build

      - name: Upload VPK
        continue-on-error: true  # artifact quota may be exhausted; branch publish below is the fallback
        uses: actions/upload-artifact@v5
        with:
          name: VitaMusicAssistant-${{ github.run_number }}
          path: build/VitaMusicAssistant.vpk
          retention-days: 2

      - name: Copy ELF for upload
        run: cp build/VitaMusicAssistant build/VitaMusicAssistant.elf

      - name: Upload ELF (for crash debugging)
        continue-on-error: true
        uses: actions/upload-artifact@v5
        with:
          name: VitaMusicAssistant-ELF-${{ github.run_number }}
          path: build/VitaMusicAssistant.elf
          retention-days: 2

      - name: Publish VPK + ELF to build-output branch (quota-proof download)
        run: |
          cd "$GITHUB_WORKSPACE"
          rm -rf /tmp/build-output && mkdir /tmp/build-output
          cp build/VitaMusicAssistant.vpk /tmp/build-output/
          gzip -c build/VitaMusicAssistant.elf > /tmp/build-output/VitaMusicAssistant.elf.gz
          echo "run ${{ github.run_number }} sha ${{ github.sha }}" > /tmp/build-output/BUILD_INFO.txt
          cd /tmp/build-output
          git init -q -b build-output
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -q -m "Build output: run ${{ github.run_number }} (${{ github.sha }})"
          git push -f origin build-output
