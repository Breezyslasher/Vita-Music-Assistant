name: Build VPK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          apk add cmake ninja build-base git
          vdpm zstd
          vdpm libass
          vdpm harfbuzz
          vdpm fribidi
          vdpm freetype
          vdpm libpng
          vdpm libwebp
          vdpm libjpeg-turbo

      - name: Download pre-built libraries
        run: |
          # Download pre-built mbedtls, curl, ffmpeg, mpv for Vita
          # These should be hosted in a release or package repository
          mkdir -p $VITASDK/arm-vita-eabi/lib
          mkdir -p $VITASDK/arm-vita-eabi/include

          # Note: You need to provide pre-built libraries for:
          # - mbedtls (with mbedtls_net_sockets support)
          # - libcurl (with SSL support via mbedtls)
          # - FFmpeg (audio codecs only: flac, mp3, aac, opus, vorbis)
          # - libmpv (built with audio-only configuration)
          echo "Pre-built libraries should be downloaded from your release assets"

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target VitaMusicAssistant.vpk

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaMusicAssistant.vpk
          path: build/VitaMusicAssistant.vpk
