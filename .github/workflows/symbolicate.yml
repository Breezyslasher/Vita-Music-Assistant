name: Symbolicate crash dump

# Debug helper: symbolicates debug/crash-230.psp2dmp against the unstripped
# ELF artifact of build #230 (run 29391848462). Temporary - remove with the
# debug/ directory once the crash is fixed.

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/symbolicate.yml"
      - "debug/**"

permissions:
  contents: read
  actions: read

jobs:
  symbolicate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the crash dump)
        uses: actions/checkout@v4

      - name: Download unstripped ELF from build 230
        uses: actions/download-artifact@v4
        with:
          name: VitaMusicAssistant-ELF-230
          run-id: 29391848462
          github-token: ${{ github.token }}
          path: elf

      - name: Set up parser
        run: |
          pip3 install pyelftools
          git clone --depth 1 https://github.com/xyzz/vita-parse-core
          cd vita-parse-core
          python3 - <<'EOF'
          # py3 fixes: str2bytes was dropped from pyelftools; c_str must handle bytes
          src = open('util.py').read()
          src = src.replace(
              "from elftools.common.py3compat import str2bytes\n",
              "def str2bytes(b):\n    return b if isinstance(b, bytes) else b.encode('latin-1')\n")
          old = """def c_str(buf, off):
              out = \"\"
              while off < len(buf) and buf[off] != '\\0':
                  out += buf[off]
                  off += 1
              return out"""
          import textwrap
          old = textwrap.dedent(old)
          new = '''def c_str(buf, off):
              out = ""
              while off < len(buf):
                  b = buf[off]
                  if isinstance(b, int):
                      if b == 0: break
                      out += chr(b)
                  else:
                      if b == '\\0': break
                      out += b
                  off += 1
              return out'''
          new = textwrap.dedent(new)
          assert old in src
          open('util.py', 'w').write(src.replace(old, new))
          print("patched util.py")
          EOF

      - name: Symbolicate
        run: |
          ls -la elf/
          zcat debug/crash-230.psp2dmp > core.elf
          cd vita-parse-core
          python3 main.py ../core.elf ../elf/VitaMusicAssistant.elf || true

      - name: addr2line on crash PC and stack candidates
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq binutils-arm-none-eabi
          # Module base 0x81000000; ELF is linked at its own vaddrs. Compute the
          # text section start to translate runtime addresses.
          TEXT=$(arm-none-eabi-readelf -S elf/VitaMusicAssistant.elf | awk '/ .text/ {print "0x"$5; exit}')
          echo "text vaddr = $TEXT"
          for OFF in 0x9b6c30 0x92a91d; do
            ADDR=$(printf '0x%x' $(( $OFF + $TEXT )))
            echo "== offset $OFF (elf addr $ADDR)"
            arm-none-eabi-addr2line -e elf/VitaMusicAssistant.elf -f -C -i -p $ADDR
          done
